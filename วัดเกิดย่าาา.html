<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday คุณย่า</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap');

        body {
            background-color: #fff0f3;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* หัวใจลอยๆ */
        .heart-bg {
            position: fixed;
            top: -10%;
            color: #ffb7c5;
            z-index: -1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .cake {
            font-size: 80px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 50px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        #greeting-card {
            display: none;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 30px;
            border: 4px solid #ffcad4;
            box-shadow: 0 15px 30px rgba(255, 182, 193, 0.4);
            width: 90%;
            max-width: 500px;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 { color: #ff4d6d; font-size: 1.6rem; margin: 10px 0; }
        p { font-size: 1.1rem; color: #555; line-height: 1.6; }

        /* ส่วนจัดการรูปภาพ */
        .photo-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 25px;
        }

        .photo-frame {
            background: white;
            padding: 8px;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 1px solid #ffe5ec;
            transition: transform 0.3s;
        }

        .photo-frame:hover {
            transform: scale(1.02);
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }

        @media (min-width: 600px) {
            .cake { font: size 120px;
            h1 { font-size: 2.2rem; }
        }

        .instruction { color: #ff758f; font-size: 1rem; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="cake" onclick="showGreeting()">🎂</div>
    <div class="instruction">จิ้มที่เค้กดูคับย่านวล❤️</div>

    <div id="greeting-card">
        <div style="font-size: 24px;">✨💖✨</div>
        <h1>สุขสันต์วันเกิดย่านวล</h1>
        <p>ขอให้คุณย่าสุขภาพแข็งแรงไม่มีโรคภัยมายุงอยู่ดีมีสุขใจ<br> และปีนี่66ขวบขอให้ย่ามีความสุขเยอะะครับอยู่กับลูกหลานตลอดไปเลยน่ะครับ<br>รักคุณย่าที่สุดเลย ❤️</p>
        
        <div class="photo-grid">
            <div class="photo-frame">
                
            <video width="100%" controls>
    <source src="video1.mp4.mp4" type="video/mp4">
    เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอ
</video>
            <div class="photo-frame">
                <img src="photo2.jpg.jpg".jpg
                " alt="รูปครอบครัว 1">
            <video>
            <div class="photo-frame">
                <img src="photo3.jpg.JPEG" alt="รูปครอบครัว 2">
            </div>
        </div>
        
        <div style="margin-top:25px; font-size: 20px;">🌹🌷🌹</div>
    </div>
</div>

<script>
    function createHearts() {
        const heartCount = window.innerWidth < 600 ? 20 : 40;
        for (let i = 0; i < heartCount; i++) {
            let heart = document.createElement('div');
            heart.className = 'heart-bg';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.opacity = Math.random();
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(heart);
        }
    }

    function showGreeting() {
        const card = document.getElementById('greeting-card');
        card.style.display = 'block';
        document.querySelector('.cake').innerHTML = '🎁';
        document.querySelector('.instruction').style.display = 'none';
        createHearts();
        
        // เลื่อนหน้าจอลงเพื่อให้เห็นเนื้อหาการ์ด
        setTimeout(() => {
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    }
</script>

</body>
</html>
